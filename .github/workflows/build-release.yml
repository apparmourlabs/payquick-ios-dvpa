name: Build & Release IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for Simulator
        run: |
          cd PayQuick
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          xcodebuild build \
            -project PayQuick.xcodeproj \
            -scheme PayQuick \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package as IPA
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          echo "=== Looking for .app ==="
          find "$DERIVED_DATA" -name "PayQuick.app" -type d 2>/dev/null

          APP_PATH=$(find "$DERIVED_DATA" -name "PayQuick.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: PayQuick.app not found in DerivedData"
            find "$DERIVED_DATA" -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          echo "App found: $APP_PATH"
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          cd . && zip -r PayQuick-v2.3.1-dvpa.ipa Payload/
          ls -la PayQuick-v2.3.1-dvpa.ipa
          echo "IPA size: $(du -sh PayQuick-v2.3.1-dvpa.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PayQuick-iOS
          path: PayQuick/PayQuick-v2.3.1-dvpa.ipa

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: PayQuick-iOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.3.1-ios
          name: "PayQuick DVPA v2.3.1 (iOS)"
          body: |
            ## PayQuick iOS — Damn Vulnerable Payment App

            iOS version of the deliberately vulnerable UPI payment app with **22 intentional OWASP MASVS vulnerabilities**.

            ### Download
            - **PayQuick-v2.3.1-dvpa.ipa** — Simulator build for security analysis

            ### Scan It
            Upload to [AppArmour Labs](https://apparmourlabs.com/scan) for automated security analysis.

            > Note: This is a simulator build (unsigned). For SAST analysis purposes only — not installable on physical devices.
          files: PayQuick-v2.3.1-dvpa.ipa
          make_latest: false
