name: Build & Release IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for Simulator
        run: |
          cd PayQuick
          xcodebuild build \
            -project PayQuick.xcodeproj \
            -scheme PayQuick \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -20

      - name: Package as IPA
        run: |
          cd PayQuick
          BUILD_DIR=$(xcodebuild -project PayQuick.xcodeproj -scheme PayQuick -sdk iphonesimulator -showBuildSettings 2>/dev/null | grep -m1 "BUILD_DIR" | awk '{print $3}')
          APP_PATH="$BUILD_DIR/Release-iphonesimulator/PayQuick.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Looking for .app..."
            find ~/Library/Developer/Xcode -name "PayQuick.app" -type d 2>/dev/null | head -5
            APP_PATH=$(find ~/Library/Developer/Xcode -name "PayQuick.app" -type d 2>/dev/null | head -1)
          fi

          echo "App path: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r PayQuick-v2.3.1-dvpa.ipa Payload/
          ls -la PayQuick-v2.3.1-dvpa.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PayQuick-iOS
          path: PayQuick/PayQuick-v2.3.1-dvpa.ipa

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: PayQuick-iOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.3.1-ios
          name: "PayQuick DVPA v2.3.1 (iOS)"
          body: |
            ## PayQuick iOS — Damn Vulnerable Payment App

            iOS version of the deliberately vulnerable UPI payment app with **22 intentional OWASP MASVS vulnerabilities**.

            ### Download
            - **PayQuick-v2.3.1-dvpa.ipa** — Simulator build for security analysis

            ### Scan It
            Upload to [AppArmour Labs](https://apparmourlabs.com/scan) for automated security analysis.

            > Note: This is a simulator build (unsigned). For SAST analysis purposes only — not installable on physical devices.
          files: PayQuick-v2.3.1-dvpa.ipa
          make_latest: false
