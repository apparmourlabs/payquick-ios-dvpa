name: Build & Release IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build IPA & Release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for Simulator
        run: |
          cd PayQuick
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          xcodebuild build \
            -project PayQuick.xcodeproj \
            -scheme PayQuick \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package as IPA
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          APP_PATH=$(find "$DERIVED_DATA" -name "PayQuick.app" -type d | head -1)
          echo "App found: $APP_PATH"
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r PayQuick-v2.3.1-dvpa.ipa Payload/
          echo "IPA size: $(du -sh PayQuick-v2.3.1-dvpa.ipa | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayQuick-iOS
          path: PayQuick-v2.3.1-dvpa.ipa

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.3.1-ios
          name: "PayQuick DVPA v2.3.1 (iOS)"
          body: |
            ## PayQuick iOS — Damn Vulnerable Payment App

            iOS version of the deliberately vulnerable UPI payment app with **22 intentional OWASP MASVS vulnerabilities**.

            ### Download
            - **PayQuick-v2.3.1-dvpa.ipa** — Simulator build for security analysis

            ### Scan It
            Upload to [AppArmour Labs](https://apparmourlabs.com/scan) for automated security analysis.

            > Note: This is a simulator build (unsigned). For SAST analysis purposes only.
          files: PayQuick-v2.3.1-dvpa.ipa
          make_latest: false
